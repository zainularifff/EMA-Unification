name: Clean page CSS class links

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    if: contains(github.event.head_commit.message, 'Run page CSS class cleanup')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean CSS class links from non-excluded pages
        run: node scripts/clean-page-css.cjs

      - name: Commit cleaned pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages scripts/clean-page-css.cjs .github/workflows/clean-page-css.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Clean page CSS class links"
          git push
